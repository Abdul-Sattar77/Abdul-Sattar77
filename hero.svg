<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" fill="none" font-family="'Fira Code', 'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="60%" stop-color="#031603"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="nodeGrad">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#004d14"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="320" rx="14" fill="url(#bgGrad)"/>
  <rect width="900" height="320" rx="14" fill="none" stroke="#00ff41" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- ===== NEURAL NETWORK (background, pulsing) ===== -->
  <g stroke="#00ff41" stroke-width="1" stroke-opacity="0.35">
    <line x1="660" y1="70"  x2="760" y2="120"/>
    <line x1="660" y1="70"  x2="760" y2="200"/>
    <line x1="660" y1="160" x2="760" y2="120"/>
    <line x1="660" y1="160" x2="760" y2="200"/>
    <line x1="660" y1="250" x2="760" y2="200"/>
    <line x1="660" y1="250" x2="760" y2="120"/>
    <line x1="760" y1="120" x2="840" y2="160"/>
    <line x1="760" y1="200" x2="840" y2="160"/>
  </g>
  <g fill="url(#nodeGrad)" filter="url(#glow)">
    <circle cx="660" cy="70"  r="7"><animate attributeName="r" values="7;10;7" dur="2s" begin="0s"   repeatCount="indefinite"/></circle>
    <circle cx="660" cy="160" r="7"><animate attributeName="r" values="7;10;7" dur="2s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="250" r="7"><animate attributeName="r" values="7;10;7" dur="2s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="120" r="8"><animate attributeName="r" values="8;11;8" dur="2s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="200" r="8"><animate attributeName="r" values="8;11;8" dur="2s" begin="1s"   repeatCount="indefinite"/></circle>
    <circle cx="840" cy="160" r="9"><animate attributeName="r" values="9;13;9" dur="2s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== TERMINAL WINDOW ===== -->
  <g>
    <rect x="45" y="55" width="470" height="210" rx="10" fill="#000000" fill-opacity="0.75" stroke="#00ff41" stroke-opacity="0.5" stroke-width="1.5">
      <animate attributeName="height" from="0" to="210" dur="0.5s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze"/>
    </rect>
    <!-- title bar dots -->
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/>
      <circle cx="68" cy="78" r="5" fill="#ff5f56"/>
      <circle cx="86" cy="78" r="5" fill="#ffbd2e"/>
      <circle cx="104" cy="78" r="5" fill="#27c93f"/>
      <text x="240" y="82" fill="#00ff41" font-size="11" opacity="0.6" text-anchor="middle">abdul@sattar: ~/portfolio</text>
    </g>
    <line x1="45" y1="95" x2="515" y2="95" stroke="#00ff41" stroke-opacity="0.3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/>
    </line>

    <!-- typed lines (reveal via expanding clip) -->
    <g font-size="14" fill="#00ff41">
      <text x="65" y="128" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.1s" fill="freeze"/>
        <tspan fill="#5efc82">$</tspan> whoami
      </text>
      <text x="65" y="155" fill="#e0e0e0" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.1s" fill="freeze"/>
        AI Engineer &amp; Full-Stack Developer
      </text>
      <text x="65" y="188" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.1s" fill="freeze"/>
        <tspan fill="#5efc82">$</tspan> cat mission.txt
      </text>
      <text x="65" y="215" fill="#e0e0e0" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.1s" fill="freeze"/>
        Turning ideas into intelligent systems.
      </text>
      <!-- blinking cursor -->
      <rect x="65" y="235" width="9" height="16" fill="#00ff41" opacity="0">
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.63;0.64" dur="4.6s" fill="freeze"/>
        <animate attributeName="opacity" values="1;0;1" begin="3s" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== NAME (particle-assemble reveal) ===== -->
  <g filter="url(#glow)">
    <text x="662" y="300" font-size="30" font-weight="700" fill="#00ff41" opacity="0" letter-spacing="1">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.8s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 -18" to="0 0" begin="3.2s" dur="0.8s" fill="freeze"/>
      ABDUL SATTAR
    </text>
  </g>
</svg>
