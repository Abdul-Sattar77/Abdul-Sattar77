<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400" font-family="'Fira Code','Courier New',monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="70%" stop-color="#021a02"/>
      <stop offset="100%" stop-color="#043d04"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="core"><stop offset="0%" stop-color="#aaffbb"/><stop offset="60%" stop-color="#00ff41"/><stop offset="100%" stop-color="#004d14"/></radialGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="400" rx="16" fill="url(#sky)"/>
  <rect width="900" height="400" rx="16" fill="none" stroke="#00ff41" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- ===== MATRIX RAIN (falling columns) ===== -->
  <g font-size="13" fill="#00ff41" opacity="0.5">
    <text x="70"  y="0">1<animate attributeName="y" values="-20;420" dur="3.5s" begin="0s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="3.5s" begin="0s" repeatCount="indefinite"/></text>
    <text x="150" y="0">0<animate attributeName="y" values="-40;420" dur="4.2s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="4.2s" begin="0.5s" repeatCount="indefinite"/></text>
    <text x="230" y="0">1<animate attributeName="y" values="-10;420" dur="3s"   begin="1s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0" dur="3s" begin="1s" repeatCount="indefinite"/></text>
    <text x="820" y="0">0<animate attributeName="y" values="-30;420" dur="3.8s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="3.8s" begin="0.2s" repeatCount="indefinite"/></text>
    <text x="770" y="0">1<animate attributeName="y" values="-50;420" dur="4.5s" begin="1.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="4.5s" begin="1.4s" repeatCount="indefinite"/></text>
    <text x="700" y="0">0<animate attributeName="y" values="-15;420" dur="3.3s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="3.3s" begin="0.8s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== SKYLINE (bottom, glowing windows) ===== -->
  <g fill="#001a00" stroke="#00ff41" stroke-opacity="0.4" stroke-width="1">
    <rect x="600" y="300" width="40" height="100"/>
    <rect x="648" y="270" width="34" height="130"/>
    <rect x="690" y="320" width="44" height="80"/>
    <rect x="742" y="255" width="30" height="145"/>
    <rect x="780" y="300" width="40" height="100"/>
    <rect x="828" y="285" width="38" height="115"/>
  </g>
  <g fill="#00ff41">
    <rect x="608" y="312" width="6" height="6"><animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="0s"   repeatCount="indefinite"/></rect>
    <rect x="622" y="330" width="6" height="6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></rect>
    <rect x="656" y="284" width="6" height="6"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/></rect>
    <rect x="668" y="310" width="6" height="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.1s" repeatCount="indefinite"/></rect>
    <rect x="750" y="272" width="6" height="6"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" begin="0.9s" repeatCount="indefinite"/></rect>
    <rect x="756" y="300" width="6" height="6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" begin="0.4s" repeatCount="indefinite"/></rect>
    <rect x="790" y="318" width="6" height="6"><animate attributeName="opacity" values="1;0.4;1" dur="2.1s" begin="0.7s" repeatCount="indefinite"/></rect>
    <rect x="838" y="300" width="6" height="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" begin="0.2s" repeatCount="indefinite"/></rect>
  </g>

  <!-- ===== ORBITING TECH RING (right center) ===== -->
  <g transform="translate(760,160)">
    <circle r="55" fill="none" stroke="#00ff41" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 4"/>
    <circle r="14" fill="url(#core)" filter="url(#softglow)">
      <animate attributeName="r" values="12;16;12" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-size="11" font-weight="700" fill="#001400">AI</text>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <circle cx="0" cy="-55" r="6" fill="#00ff41"/>
        <circle cx="52" cy="17" r="6" fill="#00ff41"/>
        <circle cx="-32" cy="45" r="6" fill="#00ff41"/>
        <circle cx="-32" cy="-45" r="6" fill="#00ff41"/>
        <circle cx="52" cy="-17" r="6" fill="#00ff41"/>
      </g>
    </g>
  </g>

  <!-- ===== TERMINAL WINDOW (left, self-typing code) ===== -->
  <g>
    <rect x="45" y="70" width="470" height="285" rx="10" fill="#000000" fill-opacity="0.82" stroke="#00ff41" stroke-opacity="0.5" stroke-width="1.5">
      <animate attributeName="height" from="0" to="285" dur="0.5s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze"/>
    </rect>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/>
      <circle cx="68" cy="92" r="5" fill="#ff5f56"/>
      <circle cx="86" cy="92" r="5" fill="#ffbd2e"/>
      <circle cx="104" cy="92" r="5" fill="#27c93f"/>
      <text x="280" y="96" fill="#00ff41" font-size="11" opacity="0.55" text-anchor="middle">abdul_sattar.py — dev environment</text>
    </g>
    <line x1="45" y1="110" x2="515" y2="110" stroke="#00ff41" stroke-opacity="0.3" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/></line>

    <!-- syntax-highlighted code, line by line -->
    <g font-size="13.5">
      <text x="64" y="140" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.05s" fill="freeze"/><tspan fill="#ff79c6">class</tspan><tspan fill="#8be9fd"> Developer</tspan><tspan fill="#e0e0e0">:</tspan></text>
      <text x="80" y="165" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.05s" fill="freeze"/><tspan fill="#ff79c6">def</tspan><tspan fill="#50fa7b"> __init__</tspan><tspan fill="#e0e0e0">(self):</tspan></text>
      <text x="96" y="190" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.05s" fill="freeze"/><tspan fill="#e0e0e0">self.name </tspan><tspan fill="#ff79c6">=</tspan><tspan fill="#f1fa8c"> "Abdul Sattar"</tspan></text>
      <text x="96" y="215" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.05s" fill="freeze"/><tspan fill="#e0e0e0">self.role </tspan><tspan fill="#ff79c6">=</tspan><tspan fill="#f1fa8c"> "AI &amp; Full-Stack Dev"</tspan></text>
      <text x="96" y="240" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.05s" fill="freeze"/><tspan fill="#e0e0e0">self.team </tspan><tspan fill="#ff79c6">=</tspan><tspan fill="#f1fa8c"> "ClusterCrew"</tspan></text>
      <text x="80" y="270" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.05s" fill="freeze"/><tspan fill="#ff79c6">def</tspan><tspan fill="#50fa7b"> mission</tspan><tspan fill="#e0e0e0">(self):</tspan></text>
      <text x="96" y="295" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.05s" fill="freeze"/><tspan fill="#ff79c6">return</tspan><tspan fill="#f1fa8c"> "Turn ideas → systems 🚀"</tspan></text>
      <!-- prompt + blinking cursor -->
      <text x="64" y="325" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.05s" fill="freeze"/><tspan fill="#50fa7b">&gt;&gt;&gt;</tspan><tspan fill="#e0e0e0"> Developer().mission()</tspan></text>
      <rect x="305" y="313" width="8" height="15" fill="#00ff41">
        <animate attributeName="opacity" values="1;0" dur="0.8s" begin="4.6s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== NAME (title, glowing, assembles) ===== -->
  <g filter="url(#glow)">
    <text x="700" y="290" text-anchor="middle" font-size="30" font-weight="800" fill="#00ff41" opacity="0" letter-spacing="2">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.8s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 -14" to="0 0" begin="3.4s" dur="0.8s" fill="freeze"/>
      ABDUL SATTAR
    </text>
    <text x="700" y="315" text-anchor="middle" font-size="12" fill="#5efc82" opacity="0" letter-spacing="3">
      <animate attributeName="opacity" from="0" to="0.85" begin="4.2s" dur="0.6s" fill="freeze"/>
      A I   •   W E B   •   A P P
    </text>
  </g>

  <!-- ===== SCANLINE sweep over everything ===== -->
  <rect x="0" y="0" width="900" height="60" fill="url(#scan)" opacity="0.6">
    <animate attributeName="y" values="-60;400" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
